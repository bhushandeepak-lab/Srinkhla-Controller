buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.4.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

android {
    compileSdk 33
    namespace "com.srinkhla.controller"
    defaultConfig {
        applicationId "com.srinkhla.controller"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
}
